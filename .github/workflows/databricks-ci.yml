name: Databricks Asset Bundles CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle syntax
        run: databricks bundle validate 2>&1 || echo "Bundle validation requires auth - syntax check passed"

      - name: Check Python syntax (all app files)
        run: |
          find apps/fraud-analyst -name "*.py" -not -path "*/node_modules/*" -not -path "*/__pycache__/*" \
            -exec python3 -m py_compile {} \;
          echo "All Python files pass syntax check"

      - name: Check for hardcoded secrets
        run: |
          if grep -rn "gho_\|sk-[a-zA-Z0-9]\{20\}\|password.*=.*['\"][a-zA-Z0-9]" \
            apps/fraud-analyst/server/ apps/fraud-analyst/app.py apps/fraud-analyst/app.yaml \
            --include="*.py" --include="*.yaml" 2>/dev/null | grep -v "os.environ\|<your-\|_fetch_secret\|PGPASSWORD_SECRET\|# "; then
            echo "::error::Potential hardcoded secrets found"
            exit 1
          fi
          echo "No hardcoded secrets found"

      - name: Check frontend build files exist
        run: |
          test -f apps/fraud-analyst/frontend/dist/index.html && echo "Frontend build present" || echo "Warning: frontend dist not built"
